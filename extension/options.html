<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Aegis Settings</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f4f7f6;
      color: #333;
      width: 400px;
    }
    h1 {
      font-size: 24px;
      color: #1a73e8;
      border-bottom: 2px solid #ddd;
      padding-bottom: 10px;
    }
    .section {
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }
    select {
      width: 100%;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }
    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }
    li:last-child {
      border-bottom: none;
    }
    button.remove-btn {
      background: #dc3545;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    button.remove-btn:hover {
      background: #c82333;
    }
    #status {
      color: #28a745;
      font-weight: bold;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>Aegis Security Settings</h1>

  <div class="section">
    <label for="strictness">Strictness Level</label>
    <select id="strictness">
      <option value="balanced">Balanced Mode (Block Phishing Only)</option>
      <option value="paranoid">Paranoid Mode (Block Suspicious & Phishing)</option>
    </select>
    <div id="status">Saved!</div>
  </div>

  <div class="section">
    <label>Whitelisted Domains</label>
    <ul id="whitelist">
      <li>Loading...</li>
    </ul>
  </div>

  <script src="options.js"></script>
</body>
</html>
